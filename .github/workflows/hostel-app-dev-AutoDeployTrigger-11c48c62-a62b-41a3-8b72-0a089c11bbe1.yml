name: Trigger auto deployment for hostel-app-dev

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ test-merge ]
    paths:
    - '**'
    - '.github/workflows/hostel-app-dev-AutoDeployTrigger-11c48c62-a62b-41a3-8b72-0a089c11bbe1.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.HOSTELAPPDEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.HOSTELAPPDEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.HOSTELAPPDEV_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: hostelatu.azurecr.io
          registryUsername: ${{ secrets.HOSTELAPPDEV_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.HOSTELAPPDEV_REGISTRY_PASSWORD }}
          containerAppName: hostel-app-dev
          resourceGroup: hostel-dev-rg
          imageToBuild: hostelatu.azurecr.io/hostel-app-dev:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


